# Howdy config file optimized by opencode for speed
# To apply: sudo cp howdy-optimized-config.ini /etc/howdy/config.ini

[core]
# Print that face detection is being attempted
detection_notice = false

# Print that face detection has timed out
timeout_notice = true

# Do not print anything when a face verification succeeds
no_confirmation = false

# When a user without a known face model tries to use this script, don't
# show an error but fail silently
suppress_unknown = false

# Disable Howdy in remote shells
abort_if_ssh = true

# Disable Howdy if lid is closed
abort_if_lid_closed = true

# Disable howdy in the PAM
disabled = false

# Use CNN instead of HOG
# Set to false for CPU speed. HOG is much faster.
use_cnn = false

# Set a workaround to do face and password authentication at the same time
workaround = off

[video]
# The certainty of the detected face belonging to the user
# Adjusted to 4.0 for faster recognition (Standard: 3.5)
certainty = 4.0

# The number of seconds to search before timing out
timeout = 4

# The path of the device to capture frames from
device_path = /dev/video2

# Print a warning if the video device is not found
warn_no_device = true

# Scale down the video feed to this maximum height
# Lowered to 240 for significant speed boost in detection loop
max_height = 240

# Set the camera input profile to match hardware natively (640x360)
# This removes the initialization lag of auto-detection
frame_width = 640
frame_height = 360

# Lowered threshold to 45 to prevent frame skip on IR sensor
dark_threshold = 45

# The recorder to use
recording_plugin = opencv

# Video format used by ffmpeg
device_format = v4l2

# Force MJPEG if supported by hardware (set false for your GREY sensor)
force_mjpeg = false

# Specify exposure value explicitly
exposure = -1

# Specify frame rate of the capture device (Set to 15 for your hardware)
device_fps = 15

# Rotate captured frames
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
