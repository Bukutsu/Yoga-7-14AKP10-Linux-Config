# Howdy config file - Yoga 7 Optimized (matches original 15fps + dark fix)
# Based on config.ini that gave 15fps, only dark_threshold changed

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
certainty = 3.5
timeout = 4
device_path = /dev/video2
warn_no_device = true

max_height = 320

# Auto-detect (original setting that gave 15fps)
frame_width = -1
frame_height = -1

# Only change: higher threshold to fix dark frame issue
dark_threshold = 100

recording_plugin = opencv
device_format = v4l2
force_mjpeg = false
exposure = -1
device_fps = -1
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
