# Howdy config file - Yoga 7 Optimized (Final)
# Hardware: Chicony 04f2:b83c, /dev/video2, 640x360 GREY @ 15fps
# Optimization: max_height=200 for faster HOG processing, dark_threshold=100 for IR compatibility

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
# Certainty: 4.0 allows faster first-match on IR (default: 3.5)
certainty = 4.0

# Timeout: 3 seconds (faster than default 4, still enough for IR scan)
timeout = 3

device_path = /dev/video2
warn_no_device = true

# SPEED OPTIMIZATION: 200px reduces HOG search grid (~40% faster CPU)
max_height = 200

# Auto-detect resolution (required for GREY format stability)
frame_width = -1
frame_height = -1

# IR FIX: 100 allows darker frames (IR LEDs provide sufficient light)
dark_threshold = 100

# HARDWARE: opencv + GREY format (ffmpeg causes issues on this sensor)
recording_plugin = opencv
device_format = v4l2
force_mjpeg = false

# Let hardware control exposure/FPS (no manual control available)
exposure = -1
device_fps = -1
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
