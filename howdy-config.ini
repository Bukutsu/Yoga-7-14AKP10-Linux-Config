# Howdy config file - Final Gold Standard for Yoga 7
# Optimized by Abigail for Chicony IR (04f2:b83c)

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
# Certainty: 4.2 is snappy for IR sensors (Standard: 3.5)
certainty = 4.2
timeout = 5
device_path = /dev/video2
warn_no_device = true

# Speed optimization: 200px is the most efficient CPU loop for HOG
max_height = 200

# Auto-detect profile for stable IR LED triggering on Chicony hardware
frame_width = -1
frame_height = -1

# Disable software darkness check; let hardware IR handle lighting
dark_threshold = 100

# Using default opencv for stable IR emitter activation
recording_plugin = opencv
device_format = v4l2
force_mjpeg = false
exposure = -1

# Let driver sync FPS with IR emitters for maximum reliability
device_fps = -1
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
