# Howdy config file - Yoga 7 Optimized
# max_height = 200 for faster scanning, dark_threshold = 100 for dark frame fix

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
certainty = 4.0
timeout = 4
device_path = /dev/video2
warn_no_device = true

# Speed optimization: 200px reduces CPU load during scanning
max_height = 200

# Auto-detect for IR stability
frame_width = -1
frame_height = -1

# Fix dark frame issue
dark_threshold = 100

recording_plugin = opencv
device_format = v4l2
force_mjpeg = false
exposure = -1
device_fps = -1
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
