# Howdy config file optimized by opencode
# Hardware: /dev/video2 (640x360 GREY @ 15FPS)

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
# Speed optimization: 4.0 is slightly more lenient for faster matching
certainty = 4.0
timeout = 4
device_path = /dev/video2
warn_no_device = true

# Speed optimization: 240px significantly reduces HOG CPU cycles
max_height = 240

# Hardware optimization: Explicitly set to match v4l2 native profile
frame_width = 640
frame_height = 360

# GREY sensor optimization: 45 prevents unnecessary frame discards
dark_threshold = 45

recording_plugin = opencv
device_format = v4l2
force_mjpeg = false
exposure = -1

# Hardware optimization: Match native 15 FPS
device_fps = 15
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
