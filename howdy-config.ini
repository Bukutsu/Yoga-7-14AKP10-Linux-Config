# Howdy config file - Safe Optimized Version
# Reverted to opencv for better hardware compatibility with Yoga 7 IR emitters

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
# Sane certainty for reliability
certainty = 3.8
timeout = 5
device_path = /dev/video2
warn_no_device = true

# Safe speed optimization: 240px reduces CPU load without breaking IR sync
max_height = 240

# Auto-detect hardware profile to ensure IR emitters trigger correctly
frame_width = -1
frame_height = -1

# Standard dark threshold
dark_threshold = 50

# Using default opencv for maximum compatibility
recording_plugin = opencv
device_format = v4l2
force_mjpeg = false
exposure = -1

# Let the driver handle FPS to sync with IR emitters
device_fps = -1
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
