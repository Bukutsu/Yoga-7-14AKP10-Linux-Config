# Howdy config file - Final Gold Standard for Yoga 7
# Optimized by Abigail for Chicony IR (04f2:b83c)

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
# Certainty: Original 3.5 for reliability
certainty = 3.5
timeout = 4
device_path = /dev/video2
warn_no_device = true

# Original max_height for maximum IR compatibility
max_height = 320

# Auto-detect profile for stable IR LED triggering on Chicony hardware
frame_width = -1
frame_height = -1

# Disable software darkness check; let hardware IR handle lighting
dark_threshold = 100

# Using default opencv for maximum stability on Yoga 7
recording_plugin = opencv
device_format = v4l2
force_mjpeg = false

# Auto exposure for hardware compatibility
exposure = -1

# Let the driver handle FPS for IR sync
device_fps = -1
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
