# Howdy config file - Safe Optimized Version
# Reverted to opencv for better hardware compatibility with Yoga 7 IR emitters

[core]
detection_notice = false
timeout_notice = true
no_confirmation = false
suppress_unknown = false
abort_if_ssh = true
abort_if_lid_closed = true
disabled = false
use_cnn = false
workaround = off

[video]
# Optimized config for speed and IR compatibility
certainty = 4.0
timeout = 5
device_path = /dev/video2
warn_no_device = true

# Speed optimization: 240px reduces CPU load during HOG detection
max_height = 240

# Auto-detect profile for stable IR LED triggering
frame_width = -1
frame_height = -1

# Increased threshold to accept darker frames from IR sensor
dark_threshold = 90

# Using default opencv for maximum compatibility
recording_plugin = opencv
device_format = v4l2
force_mjpeg = false
exposure = -1

# Let the driver handle FPS to sync with IR emitters
device_fps = -1
rotate = 0

[snapshots]
save_failed = false
save_successful = false

[rubberstamps]
enabled = false
stamp_rules =
	nod		5s		failsafe     min_distance=12

[debug]
end_report = false
verbose_stamps = false
gtk_stdout = false
