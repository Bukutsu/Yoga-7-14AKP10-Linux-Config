default_sched = "scx_lavd"
default_mode = "Auto"

[scheds.scx_tickless]
auto_mode = []
gaming_mode = ["-f", "5000", "-s", "5000"]
lowlatency_mode = ["-f", "5000", "-s", "1000"]
powersave_mode = ["-f", "50"]
server_mode = ["-f", "100"]

[scheds.scx_flash]
auto_mode = []
gaming_mode = ["-m", "all"]
lowlatency_mode = ["-m", "performance", "-w", "-C", "0"]
powersave_mode = ["-m", "powersave", "-I", "10000", "-t", "10000", "-s", "10000", "-S", "1000"]
server_mode = ["-m", "all", "-s", "20000", "-S", "1000", "-I", "-1", "-D", "-L"]

[scheds.scx_lavd]
# LAVD: Optimized for Ryzen AI 7 350 (Shared 16MB L3 CCX)
# ACPI highest_perf verified: cores 0,2,4,6=196 (max 5.09GHz) | cores 1,3,5,7=135 (max 3.51GHz)
# All perf=196 cores are equal (no sub-tiers). SMT siblings share same perf rating.
# --autopower: Dynamic AC/Battery switching via power-profiles-daemon
# --per-cpu-dsq: Critical for Zen 5 single-CCX L3 cache locality
# --lb-low-util-pct 10: Balanced; skips periodic load balancing under light load
# --no-use-em: Bypasses kernel Energy Model in favor of our hardcoded topology
# --cpu-pref-order: Perf=196 cores first (0,2,4,6), then perf=135 cores (1,3,5,7)
# --virt-llc=4-8: Virtual LLC partitioning (AMD Strix Point single-die design)
# --preempt-shift 4: Increases preemption speed for interactive tasks (UI/Audio)
# --lb-local-dsq-util-pct 20: Bypasses complex logic for faster FIFO dispatch under low load
# --slice-min-us 200: Lowers minimum switch threshold to 0.2ms for ultra-snappy feel
auto_mode = [
    "--autopower",
    "--per-cpu-dsq",
    "--lb-low-util-pct", "10",
    "--no-use-em",
    "--cpu-pref-order", "4,12,6,14,0,8,2,10,1,3,5,7,9,11,13,15",
    "--virt-llc=4-8",
    "--preempt-shift", "4",
    "--lb-local-dsq-util-pct", "20",
    "--slice-min-us", "200"
]
# Maximum Performance Mode: All cores active, perf=196 cores prioritized, full throughput
# Use Cases: Video encoding, compilation, data processing, "I need speed NOW" tasks
# PPD Mapping: This activates when power-profiles-daemon is set to "performance"
gaming_mode = [
    "--performance",                  # All cores active, no core compaction
    "--per-cpu-dsq",                  # L1/L2 cache locality for parallel workloads
    "--cpu-pref-order", "4,12,6,14,0,8,2,10,1,3,5,7,9,11,13,15",  # perf=196 cores first
    "--virt-llc=4-8",                 # Cache partitioning for compute-heavy threads
    "--lb-low-util-pct", "0"          # Always balance load (maximize all-core utilization)
]
# Low-Latency Mode: Perf=196 cores only + No Preemption + Virtual LLC
lowlatency_mode = [
    "--performance",
    "--per-cpu-dsq",
    "--no-preemption",
    "--cpu-pref-order", "4,12,6,14,0,8,2,10",
    "--virt-llc=4-8",
    "--slice-min-us", "100"
]
# Maximum Battery Mode: E-cores prioritized, aggressive power saving, reduced overhead
# Use Cases: Web browsing, document editing, light coding, "I need battery NOW"
# PPD Mapping: This activates when power-profiles-daemon is set to "power-saver"
# Tradeoff: UI may feel 1-2ms slower for 15-25% better battery life
powersave_mode = [
    "--powersave",                    # Core compaction enabled
    "--per-cpu-dsq",                  # Cache locality (less DRAM = less power)
    "--lb-low-util-pct", "70",        # Skip periodic balancing until 70% system load
    "--lb-local-dsq-util-pct", "50",  # Simple FIFO dispatching up to 50% load
    "--cpu-pref-order", "4,12,6,14,0,8,2,10,1,3,5,7,9,11,13,15",  # perf=196 first, then perf=135
    "--virt-llc=4-8",                 # Cache efficiency (prevent expensive DRAM accesses)
    "--slice-max-us", "10000",        # Longer 10ms slices (fewer context switches)
    "--slice-min-us", "1500"          # Less aggressive 1.5ms minimum
]
server_mode = []

[scheds.scx_cosmos]
auto_mode = ["-s", "20000", "-d", "-c", "0", "-p", "0"]
gaming_mode = ["-c", "0", "-p", "0"]
lowlatency_mode = ["-m", "performance", "-c", "0", "-p", "0", "-w"]
powersave_mode = ["-m", "powersave", "-d", "-p", "5000"]
server_mode = ["-s", "20000"]

[scheds.scx_rustland]
auto_mode = []
gaming_mode = []
lowlatency_mode = []
powersave_mode = []
server_mode = []

# FALLBACK: scx_bpfland for audio production (lower jitter, fully BPF)
# Use scx-manager to temporarily switch if needed for real-time audio work
[scheds.scx_bpfland]
auto_mode = ["-m", "all", "-f", "--preferred-idle-scan"]
lowlatency_mode = ["-m", "performance", "-f", "-s", "500", "--idle-resume-us", "100"]
powersave_mode = ["-m", "powersave", "-f", "-t", "150", "--preferred-idle-scan"]
server_mode = ["-s", "20000", "-S"]

[scheds.scx_beerland]
auto_mode = []
gaming_mode = []
lowlatency_mode = []
powersave_mode = []
server_mode = []

[scheds.scx_p2dq]
auto_mode = []
gaming_mode = ["--task-slice", "true", "-f", "--sched-mode", "performance"]
lowlatency_mode = ["-y", "-f", "--task-slice", "true"]
powersave_mode = ["--sched-mode", "efficiency"]
server_mode = ["--keep-running"]

[scheds.scx_rusty]
auto_mode = []
gaming_mode = []
lowlatency_mode = []
powersave_mode = []
server_mode = []
