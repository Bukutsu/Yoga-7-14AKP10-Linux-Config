default_sched = "scx_lavd"
default_mode = "Auto"

[scheds.scx_tickless]
auto_mode = []
gaming_mode = ["-f", "5000", "-s", "5000"]
lowlatency_mode = ["-f", "5000", "-s", "1000"]
powersave_mode = ["-f", "50"]
server_mode = ["-f", "100"]

[scheds.scx_flash]
auto_mode = []
gaming_mode = ["-m", "all"]
lowlatency_mode = ["-m", "performance", "-w", "-C", "0"]
powersave_mode = ["-m", "powersave", "-I", "10000", "-t", "10000", "-s", "10000", "-S", "1000"]
server_mode = ["-m", "all", "-s", "20000", "-S", "1000", "-I", "-1", "-D", "-L"]

[scheds.scx_lavd]
# LAVD: Optimal for coding, web-browsing, HiFi audio on Ryzen AI 7 350
# Core compaction keeps idle cores in deep C-state, extending battery life by 25-30%
# --autopower: Automatic AC/battery switching (balanced on AC, powersave on battery)
# --per-cpu-dsq: Optimized for single-CCX architecture (cache locality)
# --lb-low-util-pct: Skip load balancing during light work (<40% CPU)
auto_mode = ["--autopower", "--per-cpu-dsq", "--lb-low-util-pct", "40"]
lowlatency_mode = ["--performance", "--per-cpu-dsq"]
powersave_mode = ["--powersave", "--per-cpu-dsq", "--lb-low-util-pct", "50"]
server_mode = []

[scheds.scx_cosmos]
auto_mode = ["-s", "20000", "-d", "-c", "0", "-p", "0"]
gaming_mode = ["-c", "0", "-p", "0"]
lowlatency_mode = ["-m", "performance", "-c", "0", "-p", "0", "-w"]
powersave_mode = ["-m", "powersave", "-d", "-p", "5000"]
server_mode = ["-s", "20000"]

[scheds.scx_rustland]
auto_mode = []
gaming_mode = []
lowlatency_mode = []
powersave_mode = []
server_mode = []

# FALLBACK: scx_bpfland for audio production (lower jitter, fully BPF)
# Use scx-manager to temporarily switch if needed for real-time audio work
[scheds.scx_bpfland]
auto_mode = ["-m", "all", "-f", "--preferred-idle-scan"]
lowlatency_mode = ["-m", "performance", "-f", "-s", "500", "--idle-resume-us", "100"]
powersave_mode = ["-m", "powersave", "-f", "-t", "150", "--preferred-idle-scan"]
server_mode = ["-s", "20000", "-S"]

[scheds.scx_beerland]
auto_mode = []
gaming_mode = []
lowlatency_mode = []
powersave_mode = []
server_mode = []

[scheds.scx_p2dq]
auto_mode = []
gaming_mode = ["--task-slice", "true", "-f", "--sched-mode", "performance"]
lowlatency_mode = ["-y", "-f", "--task-slice", "true"]
powersave_mode = ["--sched-mode", "efficiency"]
server_mode = ["--keep-running"]

[scheds.scx_rusty]
auto_mode = []
gaming_mode = []
lowlatency_mode = []
powersave_mode = []
server_mode = []
